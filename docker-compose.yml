version: "3.8"

services:
  nginx:
    image: "nginx:stable-alpine"
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/app
    depends_on:
      - mysql
      - php
  php:
    build:
      context: Docker
      dockerfile: php.Dockerfile
    volumes:
      - ./src:/var/www/app
  composer:
    build:
      context: Docker
      dockerfile: composer.Dockerfile
    volumes:
      - ./src:/var/www/app
  mysql:
    image: mysql:8.0
    ports:
      - "3336:3306"
    env_file:
      - env/mysql.env
    volumes:
      - mysqldata-volume:/var/lib/mysql
  artisan:
    build:
      context: Docker
      dockerfile: php.Dockerfile
    volumes:
      - ./src:/var/www/app
    entrypoint: ["php", "/var/www/app/artisan"]

volumes:
  mysqldata-volume:

